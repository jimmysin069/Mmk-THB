<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const C = {
  ink: "#0F2A3D", inkSoft: "#1B3B52", gold: "#C9A227", goldSoft: "#E6C866",
  paper: "#F7F5F0", card: "#FFFFFF", line: "#E4E0D6", text: "#20262E",
  textMute: "#6B7280", green: "#1F7A4D", red: "#B23A2E",
};

const fmt = (n, d = 0) => (isNaN(n) ? 0 : n).toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
const todayKey = (ts) => new Date(ts).toISOString().slice(0, 10);
const monthKey = (ts) => new Date(ts).toISOString().slice(0, 7);

function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
}
function save(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error(e); }
}

// ---------- Google Drive sync (uses drive.file scope — app can only see files it creates) ----------
const DRIVE_FILENAME = "mmk-thb-broker-data.json";

async function driveFindOrCreateFileId(token) {
  const cached = load("kb_drive_file_id", null);
  if (cached) return cached;
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
  const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  const listData = await listRes.json();
  if (listData.files && listData.files.length > 0) {
    save("kb_drive_file_id", listData.files[0].id);
    return listData.files[0].id;
  }
  const createRes = await fetch("https://www.googleapis.com/drive/v3/files", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ name: DRIVE_FILENAME, mimeType: "application/json" }),
  });
  const created = await createRes.json();
  save("kb_drive_file_id", created.id);
  return created.id;
}

async function driveUpload(token, dataObj) {
  const fileId = await driveFindOrCreateFileId(token);
  const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: "PATCH",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(dataObj),
  });
  if (!res.ok) throw new Error("Drive upload failed: " + res.status);
  return true;
}

async function driveDownload(token) {
  const fileId = await driveFindOrCreateFileId(token);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!res.ok) throw new Error("Drive download failed: " + res.status);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ---------- Market reference rates (free, no-key currency-api via jsDelivr CDN) ----------
const MARKET_DATA_URLS = [
  "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json",
  "https://latest.currency-api.pages.dev/v1/currencies/usd.json",
];
const OUNCE_IN_GRAMS = 31.1034768;

async function fetchMarketData() {
  let lastErr;
  for (const url of MARKET_DATA_URLS) {
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("bad status " + res.status);
      const json = await res.json();
      const u = json.usd || {};
      const usdThb = u.thb, usdMmk = u.mmk, xau = u.xau;
      if (!usdThb || !usdMmk || !xau) throw new Error("missing fields in response");
      const goldUsdOz = 1 / xau;
      const goldThbOz = goldUsdOz * usdThb;
      return {
        date: json.date,
        fetchedAt: Date.now(),
        usdThb, usdMmk,
        thbMmk: usdMmk / usdThb,
        goldThbOz,
        goldThbGram: goldThbOz / OUNCE_IN_GRAMS,
      };
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("Market data fetch failed");
}

function App() {
  const [tab, setTab] = useState("convert");
  const [marketRate, setMarketRateRaw] = useState(() => load("kb_settings", { marketRate: 130 }).marketRate);
  const [transactions, setTransactions] = useState(() => load("kb_transactions", []));
  const [rateHistory, setRateHistory] = useState(() => load("kb_rate_history", []));
  const [banks, setBanks] = useState(() => load("kb_banks", ["KBZ Bank", "AYA Bank", "CB Bank", "Bangkok Bank", "Kasikorn Bank"]));
  const [customers, setCustomers] = useState(() => load("kb_customers", []));
  const [tips, setTips] = useState(() => load("kb_tips", []));
  const [googleClientId, setGoogleClientId] = useState(() => load("kb_google_client_id", ""));
  const [accessToken, setAccessToken] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | synced | error

  const setMarketRate = (r) => setMarketRateRaw(r);

  useEffect(() => save("kb_settings", { marketRate }), [marketRate]);
  useEffect(() => save("kb_transactions", transactions), [transactions]);
  useEffect(() => save("kb_rate_history", rateHistory), [rateHistory]);
  useEffect(() => save("kb_banks", banks), [banks]);
  useEffect(() => save("kb_customers", customers), [customers]);
  useEffect(() => save("kb_tips", tips), [tips]);
  useEffect(() => save("kb_google_client_id", googleClientId), [googleClientId]);

  useEffect(() => {
    const day = todayKey(Date.now());
    setRateHistory((prev) => [...prev.filter((p) => p.date !== day), { date: day, rate: marketRate, ts: Date.now() }]);
  }, [marketRate]);

  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    }
  }, []);

  // auto-sync to Drive whenever data changes and we're connected
  useEffect(() => {
    if (!accessToken) return;
    const t = setTimeout(() => {
      setSyncStatus("syncing");
      driveUpload(accessToken, { marketRate, transactions, rateHistory, banks, customers, tips })
        .then(() => setSyncStatus("synced"))
        .catch(() => setSyncStatus("error"));
    }, 1200);
    return () => clearTimeout(t);
  }, [accessToken, marketRate, transactions, rateHistory, banks, customers, tips]);

  const restoreFromDrive = async () => {
    if (!accessToken) return;
    setSyncStatus("syncing");
    try {
      const data = await driveDownload(accessToken);
      if (data) {
        if (data.marketRate) setMarketRateRaw(data.marketRate);
        if (data.transactions) setTransactions(data.transactions);
        if (data.rateHistory) setRateHistory(data.rateHistory);
        if (data.banks) setBanks(data.banks);
        if (data.customers) setCustomers(data.customers);
        if (data.tips) setTips(data.tips);
      }
      setSyncStatus("synced");
    } catch {
      setSyncStatus("error");
    }
  };

  const addTransaction = (tx) => setTransactions((prev) => [tx, ...prev]);
  const deleteTransaction = (id) => setTransactions((prev) => prev.filter((t) => t.id !== id));
  const addCustomer = (c) => setCustomers((prev) => [c, ...prev]);
  const updateCustomer = (id, patch) => setCustomers((prev) => prev.map((c) => (c.id === id ? { ...c, ...patch } : c)));
  const deleteCustomer = (id) => setCustomers((prev) => prev.filter((c) => c.id !== id));
  const addTip = (t) => setTips((prev) => [t, ...prev]);
  const deleteTip = (id) => setTips((prev) => prev.filter((t) => t.id !== id));

  return (
    <div style={{ background: C.paper, minHeight: "100vh", color: C.text }}>
      <div style={{ maxWidth: 460, margin: "0 auto", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
        <Header marketRate={marketRate} onSettings={() => setTab("settings")} syncStatus={accessToken ? syncStatus : null} />
        <div style={{ flex: 1, paddingBottom: 84 }}>
          {tab === "convert" && <ConvertTab marketRate={marketRate} setMarketRate={setMarketRate} />}
          {tab === "new" && (
            <NewTransactionTab
              marketRate={marketRate}
              customers={customers}
              onSave={(tx) => { addTransaction(tx); setTab("history"); }}
              onSaveTip={(tip) => { addTip(tip); setTab("history"); }}
            />
          )}
          {tab === "history" && <HistoryTab transactions={transactions} tips={tips} onDelete={deleteTransaction} onDeleteTip={deleteTip} />}
          {tab === "customers" && (
            <CustomersTab customers={customers} banks={banks} onAdd={addCustomer} onUpdate={updateCustomer} onDelete={deleteCustomer} />
          )}
          {tab === "reports" && <ReportsTab transactions={transactions} tips={tips} rateHistory={rateHistory} currentRate={marketRate} />}
          {tab === "settings" && (
            <SettingsTab
              banks={banks} setBanks={setBanks}
              googleClientId={googleClientId} setGoogleClientId={setGoogleClientId}
              accessToken={accessToken} setAccessToken={setAccessToken}
              syncStatus={syncStatus} setSyncStatus={setSyncStatus}
              onRestore={restoreFromDrive}
            />
          )}
        </div>
        <BottomNav tab={tab} setTab={setTab} />
      </div>
    </div>
  );
}

function Header({ marketRate, onSettings, syncStatus }) {
  const syncLabel = { syncing: "Syncing…", synced: "Synced", error: "Sync error" }[syncStatus] || null;
  return (
    <div style={{ background: C.ink, color: "#fff", padding: "18px 20px 16px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, opacity: 0.85, fontSize: 12, letterSpacing: 1, textTransform: "uppercase" }}>
          <Icon path={ICONS.coin} size={14} color={C.gold} />
          <span>MMK · THB Exchange</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {syncLabel && (
            <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: syncStatus === "error" ? "#F0A79E" : "#B9C4CE" }}>
              <Icon path={ICONS.cloud} size={13} color={syncStatus === "error" ? "#F0A79E" : C.goldSoft} />
              {syncLabel}
            </span>
          )}
          <button onClick={onSettings} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}>
            <Icon path={ICONS.gear} size={19} color="#B9C4CE" />
          </button>
        </div>
      </div>
      <div style={{ fontSize: 13, marginTop: 6, color: "#B9C4CE" }}>
        Today's rate: <span style={{ color: C.goldSoft, fontWeight: 600 }}>{fmt(marketRate, 2)}</span> MMK per 1 THB
      </div>
    </div>
  );
}

function BottomNav({ tab, setTab }) {
  const items = [
    { id: "convert", label: "Convert", icon: ICONS.convert },
    { id: "new", label: "New", icon: ICONS.plus },
    { id: "history", label: "History", icon: ICONS.history },
    { id: "customers", label: "Customers", icon: ICONS.users },

            <span style={{ fontSize: 11, fontWeight: active ? 700 : 500, color: active ? C.ink : C.textMute }}>{label}</span>
          </button>
        );
      })}

  );
}

function Label({ children }) {

const inputStyle = { width: "100%", padding: "12px 14px", borderRadius: 10, border: `1px solid ${C.line}`, fontSize: 17, fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace", background: "#FCFBF8", color: C.text, boxSizing: "border-box" };

function ToggleGroup({ options, value, onChange }) {

    <div style={{ display: "flex", background: "#EFECE3", borderRadius: 10, padding: 3 }}>
      {options.map((opt) => (
        <button key={opt.value} onClick={() => onChange(opt.value)} style={{ flex: 1, padding: "9px 0", borderRadius: 8, border: "none", cursor: "pointer", background: value === opt.value ? C.ink : "transparent", color: value === opt.value ? "#fff" : C.textMute, fontWeight: 600, fontSize: 13 }}>
          {opt.label}

function RateBoard({ value }) {
  const str = fmt(value, 2);
  return (
    <div style={{ display: "flex", justifyContent: "center", gap: 4, flexWrap: "wrap", margin: "18px 0" }}>
      {str.split("").map((ch, i) => (
        <div key={i} style={{ minWidth: (ch === "." || ch === ",") ? 10 : 30, height: 46, background: C.ink, color: C.goldSoft, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "ui-monospace, monospace", fontSize: 24, fontWeight: 700, boxShadow: "inset 0 -2px 0 rgba(0,0,0,0.35)" }}>
          {ch}
        </div>
      ))}
    </div>
  );
}

// ---------- lightweight SVG charts (no external chart library) ----------
function BarChartSVG({ data, height = 160 }) {
  const w = 320, h = height, pad = 22;
  const max = Math.max(1, ...data.map((d) => Math.abs(d.value)));
  const barW = (w - pad * 2) / data.length;
  const zeroY = pad + (h - pad * 2) / 2;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      <line x1={pad} y1={zeroY} x2={w - pad} y2={zeroY} stroke={C.line} strokeWidth="1" />
      {data.map((d, i) => {
        const barH = (Math.abs(d.value) / max) * ((h - pad * 2) / 2 - 4);
        const x = pad + i * barW + barW * 0.18;
        const y = d.value >= 0 ? zeroY - barH : zeroY;
        return <rect key={i} x={x} y={y} width={barW * 0.64} height={Math.max(barH, 1)} fill={d.value >= 0 ? C.green : C.red} rx="2" />;
      })}
    </svg>
  );
}

function LineChartSVG({ data, height = 160 }) {
  const w = 320, h = height, pad = 22;
  const values = data.map((d) => d.value);
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = (w - pad * 2) / (data.length - 1 || 1);
  const points = data.map((d, i) => {
    const x = pad + i * stepX;
    const y = pad + (1 - (d.value - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const path = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      <path d={path} fill="none" stroke={C.gold} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// ---------------- Convert Tab ----------------
function ConvertTab({ marketRate, setMarketRate }) {
  const [dir, setDir] = useState("mmk_to_thb");
  const [amount, setAmount] = useState("100000");
  const [rateInput, setRateInput] = useState(String(marketRate));
  const [exMmk, setExMmk] = useState("100000");
  const [exThb, setExThb] = useState("775");

  useEffect(() => setRateInput(String(marketRate)), [marketRate]);

  const amt = parseFloat(amount) || 0;
  const rate = parseFloat(rateInput) || 0;
  const result = dir === "mmk_to_thb" ? (rate ? amt / rate : 0) : amt * rate;

  const applyExample = () => {
    const mmk = parseFloat(exMmk) || 0, thb = parseFloat(exThb) || 0;
    if (thb > 0) setMarketRate(Math.round((mmk / thb) * 100) / 100);
  };

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      <MarketRatesCard setMarketRate={setMarketRate} />
      <PriceChartCard />
      <Card>
        <Label>Current market rate (MMK per 1 THB)</Label>
        <RateBoard value={marketRate} />
        <input type="number" value={rateInput} onChange={(e) => setRateInput(e.target.value)} onBlur={() => rate > 0 && setMarketRate(rate)} style={{ ...inputStyle, textAlign: "center" }} />
        <div style={{ fontSize: 12, color: C.textMute, marginTop: 8, textAlign: "center" }}>This is your reference rate — new transactions compare against it to work out profit.</div>
      </Card>
      <Card>
        <Label>Set rate from an example</Label>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input type="number" value={exMmk} onChange={(e) => setExMmk(e.target.value)} style={inputStyle} placeholder="MMK" />
          <span style={{ color: C.textMute, fontSize: 13 }}>=</span>
          <input type="number" value={exThb} onChange={(e) => setExThb(e.target.value)} style={inputStyle} placeholder="THB" />
        </div>
        <button onClick={applyExample} style={{ marginTop: 10, width: "100%", padding: "10px 0", background: C.gold, color: "#fff", border: "none", borderRadius: 10, fontWeight: 700, cursor: "pointer" }}>Use this rate</button>
      </Card>
      <Card>
        <Label>Quick calculator</Label>
        <ToggleGroup value={dir} onChange={setDir} options={[{ value: "mmk_to_thb", label: "MMK → THB" }, { value: "thb_to_mmk", label: "THB → MMK" }]} />
        <div style={{ marginTop: 12 }}>
          <Label>{dir === "mmk_to_thb" ? "Amount in MMK" : "Amount in THB"}</Label>
          <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} style={inputStyle} />
        </div>
        <div style={{ marginTop: 14, padding: 14, background: C.paper, borderRadius: 10, textAlign: "center" }}>
          <div style={{ fontSize: 12, color: C.textMute, marginBottom: 4 }}>Result</div>
          <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "ui-monospace, monospace" }}>{dir === "mmk_to_thb" ? `฿ ${fmt(result, 2)}` : `${fmt(result, 0)} MMK`}</div>
        </div>
      </Card>
    </div>
  );
}

function MarketRatesCard({ setMarketRate }) {
  const [data, setData] = useState(() => load("kb_market_data", null));
  const [status, setStatus] = useState("idle"); // idle | loading | error
  const [multiplier, setMultiplier] = useState(() => load("kb_parallel_multiplier", 2));

  const refresh = () => {
    setStatus("loading");
    fetchMarketData()
      .then((d) => { setData(d); save("kb_market_data", d); setStatus("idle"); })
      .catch(() => setStatus("error"));
  };

  useEffect(() => { refresh(); }, []);
  useEffect(() => save("kb_parallel_multiplier", multiplier), [multiplier]);

  const Row = ({ label, value, sub, action }) => (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: `1px solid ${C.line}` }}>

async function fetchDaySnapshot(dateStr, isLatest) {
  const urls = isLatest
    ? ["https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json", "https://latest.currency-api.pages.dev/v1/currencies/usd.json"]
    : [`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${dateStr}/v1/currencies/usd.json`, `https://${dateStr}.currency-api.pages.dev/v1/currencies/usd.json`];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const json = await res.json();
      const u = json.usd;
      if (!u || !u.thb || !u.mmk || !u.xau) continue;
      return { date: json.date || dateStr, thb: u.thb, mmk: u.mmk, xau: u.xau };
    } catch {}
  }
  return null;
}

async function fetchHistory(days) {
  const cache = load("kb_history_cache", {});
  const dateList = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dateList.push(d.toISOString().slice(0, 10));
  }
  const todayStr = todayKey(Date.now());
  const missing = dateList.filter((d) => !cache[d] || d === todayStr);
  const results = await Promise.all(missing.map((d) => fetchDaySnapshot(d, d === todayStr)));
  missing.forEach((d, i) => { if (results[i]) cache[d] = results[i]; });
  save("kb_history_cache", cache);
  return dateList.map((d) => cache[d]).filter(Boolean);
}

// ---------------- Price chart (TradingView-style) ----------------
const CHART_INSTRUMENTS = [
  { key: "thb_mmk", label: "THB/MMK", compute: (d) => d.mmk / d.thb },
  { key: "usd_mmk", label: "USD/MMK", compute: (d) => d.mmk },
  { key: "usd_thb", label: "USD/THB", compute: (d) => d.thb },
  { key: "gold_thb", label: "Gold/THB (oz)", compute: (d) => (1 / d.xau) * d.thb },
];
const CHART_RANGES = [7, 30, 90];

function PriceChartCard() {
  const [instrumentKey, setInstrumentKey] = useState("thb_mmk");
  const [range, setRange] = useState(30);
  const [rows, setRows] = useState([]);
  const [status, setStatus] = useState("loading");
  const [hoverIdx, setHoverIdx] = useState(null);
  const wrapRef = React.useRef(null);

  const instrument = CHART_INSTRUMENTS.find((i) => i.key === instrumentKey);

  useEffect(() => {
    let cancelled = false;
    setStatus("loading");
    fetchHistory(range)
      .then((data) => { if (!cancelled) { setRows(data); setStatus(data.length >= 2 ? "idle" : "error"); } })
      .catch(() => !cancelled && setStatus("error"));
    return () => { cancelled = true; };
  }, [range]);

  const series = rows.map((r) => ({ date: r.date, value: instrument.compute(r) }));
  const last = series[series.length - 1];
  const first = series[0];
  const changePct = first && last ? ((last.value - first.value) / first.value) * 100 : 0;
  const up = changePct >= 0;
  const lineColor = up ? "#3DBE7A" : "#E0564A";

  const handleMove = (clientX) => {
    if (!wrapRef.current || series.length === 0) return;
    const rect = wrapRef.current.getBoundingClientRect();
    const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    setHoverIdx(Math.round(ratio * (series.length - 1)));
  };

  const w = 320, h = 190, padX = 8, padY = 16;
  const values = series.map((s) => s.value);
  const min = values.length ? Math.min(...values) : 0;
  const max = values.length ? Math.max(...values) : 1;
  const spread = max - min || 1;
  const stepX = series.length > 1 ? (w - padX * 2) / (series.length - 1) : 0;
  const points = series.map((s, i) => [padX + i * stepX, padY + (1 - (s.value - min) / spread) * (h - padY * 2)]);
  const linePath = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const areaPath = points.length ? `${linePath} L${points[points.length - 1][0]},${h - padY} L${points[0][0]},${h - padY} Z` : "";
  const hover = hoverIdx !== null ? series[hoverIdx] : null;
  const hoverPoint = hoverIdx !== null ? points[hoverIdx] : null;

  return (
    <Card style={{ background: "#0B1A26", border: "none", color: "#fff" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 12, color: "#7C97A8", textTransform: "uppercase", letterSpacing: 0.4 }}>{instrument.label}</div>
          <div style={{ fontFamily: "ui-monospace, monospace", fontSize: 22, fontWeight: 700, marginTop: 2 }}>
            {hover ? fmt(hover.value, 2) : last ? fmt(last.value, 2) : "—"}
          </div>
          <div style={{ fontSize: 12, fontWeight: 700, color: lineColor, marginTop: 2 }}>
            {series.length > 1 ? `${up ? "▲" : "▼"} ${fmt(Math.abs(changePct), 2)}% over ${range}D` : "—"}
          </div>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {CHART_RANGES.map((r) => (
            <button key={r} onClick={() => setRange(r)} style={{ padding: "5px 9px", borderRadius: 7, border: "none", background: range === r ? "#1F3646" : "transparent", color: range === r ? "#fff" : "#7C97A8", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
              {r}D
            </button>
          ))}
        </div>
      </div>

      <div
        ref={wrapRef}
        style={{ position: "relative", touchAction: "pan-y" }}
        onMouseMove={(e) => handleMove(e.clientX)}
        onMouseLeave={() => setHoverIdx(null)}
        onTouchMove={(e) => handleMove(e.touches[0].clientX)}
        onTouchEnd={() => setHoverIdx(null)}
      >
        {status === "loading" && <div style={{ height: h, display: "flex", alignItems: "center", justifyContent: "center", color: "#7C97A8", fontSize: 13 }}>Loading chart…</div>}
        {status === "error" && <div style={{ height: h, display: "flex", alignItems: "center", justifyContent: "center", color: "#E0564A", fontSize: 13 }}>Couldn't load history — check your connection.</div>}
        {status === "idle" && (
          <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
            <defs>
              <linearGradient id={`grad-${instrumentKey}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={lineColor} stopOpacity="0.35" />
                <stop offset="100%" stopColor={lineColor} stopOpacity="0" />
              </linearGradient>
            </defs>
            {[0.25, 0.5, 0.75].map((f) => (
              <line key={f} x1={padX} x2={w - padX} y1={padY + f * (h - padY * 2)} y2={padY + f * (h - padY * 2)} stroke="#1F3646" strokeWidth="1" />
            ))}
            <path d={areaPath} fill={`url(#grad-${instrumentKey})`} stroke="none" />
            <path d={linePath} fill="none" stroke={lineColor} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
            {hoverPoint && (
              <>
                <line x1={hoverPoint[0]} x2={hoverPoint[0]} y1={padY} y2={h - padY} stroke="#7C97A8" strokeWidth="1" strokeDasharray="3,3" />
                <circle cx={hoverPoint[0]} cy={hoverPoint[1]} r="4" fill={lineColor} stroke="#0B1A26" strokeWidth="1.5" />
              </>
            )}
          </svg>
        )}
        {hover && (
          <div style={{ position: "absolute", top: 4, right: 4, background: "rgba(0,0,0,0.5)", borderRadius: 6, padding: "3px 8px", fontSize: 11, color: "#fff" }}>
            {hover.date}
          </div>
        )}
      </div>

      <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
        {CHART_INSTRUMENTS.map((i) => (
          <button
            key={i.key}
            onClick={() => setInstrumentKey(i.key)}
            style={{ padding: "6px 10px", borderRadius: 8, border: `1px solid ${instrumentKey === i.key ? C.gold : "#1F3646"}`, background: instrumentKey === i.key ? "rgba(201,162,39,0.15)" : "transparent", color: instrumentKey === i.key ? C.goldSoft : "#7C97A8", fontSize: 12, fontWeight: 700, cursor: "pointer" }}
          >
            {i.label}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 11, color: "#5E7684", marginTop: 10 }}>
        Daily closes from exchange-api (fawazahmed0) · not real-time / intraday.
      </div>
    </Card>
  );
}

function NewTransactionTab({ marketRate, customers, onSave, onSaveTip }) {
  const [entryType, setEntryType] = useState("exchange"); // exchange | tip
  const [direction, setDirection] = useState("buy");
  const [inputCurrency, setInputCurrency] = useState("THB");
  const [amountInput, setAmountInput] = useState("");
  const [rateApplied, setRateApplied] = useState(String(marketRate));
  const [note, setNote] = useState("");
  const [customerId, setCustomerId] = useState("");
  const [checkAmount, setCheckAmount] = useState(false);
  const [checkReceipt, setCheckReceipt] = useState(false);

  const [tipCurrency, setTipCurrency] = useState("THB");
  const [tipAmount, setTipAmount] = useState("");
  const [tipNote, setTipNote] = useState("");
  const [tipChecked, setTipChecked] = useState(false);

  useEffect(() => setRateApplied(String(marketRate)), [marketRate]);

  const rate = parseFloat(rateApplied) || 0;
  const amt = parseFloat(amountInput) || 0;
  const amountThb = inputCurrency === "THB" ? amt : (rate ? amt / rate : 0);
  const amountMmk = inputCurrency === "MMK" ? amt : amt * rate;
  const profit = direction === "buy" ? amountThb * (marketRate - rate) : amountThb * (rate - marketRate);
  const customer = customers.find((c) => c.id === customerId);
  const canSave = amt > 0 && rate > 0 && checkAmount && checkReceipt;

  const save = () => {
    if (!canSave) return;
    onSave({
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7), ts: Date.now(), direction,
      amountThb, amountMmk, rateApplied: rate, marketRate, profit, note: note.trim(),
      customerId: customerId || null, customerName: customer ? customer.name : null,
    });
    setAmountInput(""); setNote(""); setCheckAmount(false); setCheckReceipt(false);
  };

  const tipAmt = parseFloat(tipAmount) || 0;
  const tipThb = tipCurrency === "THB" ? tipAmt : (marketRate ? tipAmt / marketRate : 0);
  const tipMmk = tipCurrency === "MMK" ? tipAmt : tipAmt * marketRate;
  const canSaveTip = tipAmt > 0 && tipChecked;

  const saveTip = () => {
    if (!canSaveTip) return;
    onSaveTip({
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7), ts: Date.now(),
      currency: tipCurrency, amountThb: tipThb, amountMmk: tipMmk, note: tipNote.trim(),
    });
    setTipAmount(""); setTipNote(""); setTipChecked(false);
  };

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      <Card>
        <Label>Entry type</Label>
        <ToggleGroup value={entryType} onChange={setEntryType} options={[{ value: "exchange", label: "Exchange" }, { value: "tip", label: "Tip income" }]} />
      </Card>

      {entryType === "tip" ? (
        <>
          <Card>
            <Label>Tip currency</Label>
            <ToggleGroup value={tipCurrency} onChange={setTipCurrency} options={[{ value: "THB", label: "THB" }, { value: "MMK", label: "MMK" }]} />
            <div style={{ marginTop: 12 }}><Label>Amount</Label><input type="number" value={tipAmount} onChange={(e) => setTipAmount(e.target.value)} style={inputStyle} placeholder="0" /></div>
            <div style={{ marginTop: 12 }}><Label>Note (optional)</Label><input type="text" value={tipNote} onChange={(e) => setTipNote(e.target.value)} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} placeholder="Shift / date reference" /></div>
          </Card>
          <Card style={{ background: C.ink, color: "#fff", border: "none" }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14 }}>
              <span style={{ color: "#B9C4CE" }}>≈ Value</span>
              <span style={{ fontFamily: "ui-monospace, monospace", fontWeight: 700, color: C.goldSoft }}>
                {tipCurrency === "THB" ? `${fmt(tipMmk, 0)} MMK` : `฿ ${fmt(tipThb, 2)}`}
              </span>
            </div>
          </Card>
          <Card>
            <label style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 2px", cursor: "pointer" }}>
              <Checkbox checked={tipChecked} onChange={setTipChecked} />
              <span style={{ fontSize: 14 }}>Check amount — counted and correct</span>
            </label>
          </Card>
          <button onClick={saveTip} disabled={!canSaveTip} style={{ padding: "14px 0", borderRadius: 12, border: "none", fontWeight: 700, fontSize: 16, background: canSaveTip ? C.gold : "#D8D3C4", color: "#fff", cursor: canSaveTip ? "pointer" : "not-allowed" }}>
            {tipChecked ? "Save tip" : "Tick the check to save"}
          </button>
        </>
      ) : (
      <>
      <Card>
        <Label>Transaction type</Label>
        <ToggleGroup value={direction} onChange={setDirection} options={[{ value: "buy", label: "Buy THB (from customer)" }, { value: "sell", label: "Sell THB (to customer)" }]} />
      </Card>
      <Card>
        <Label>Customer (optional)</Label>
        <select value={customerId} onChange={(e) => setCustomerId(e.target.value)} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }}>
          <option value="">Walk-in / no profile</option>
          {customers.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </Card>
      <Card>
        <Label>Amount currency</Label>
        <ToggleGroup value={inputCurrency} onChange={setInputCurrency} options={[{ value: "THB", label: "THB" }, { value: "MMK", label: "MMK" }]} />
        <div style={{ marginTop: 12 }}><Label>Amount</Label><input type="number" value={amountInput} onChange={(e) => setAmountInput(e.target.value)} style={inputStyle} placeholder="0" /></div>
        <div style={{ marginTop: 12 }}><Label>Rate you're applying (MMK per 1 THB)</Label><input type="number" value={rateApplied} onChange={(e) => setRateApplied(e.target.value)} style={inputStyle} /></div>
        <div style={{ marginTop: 12 }}><Label>Note (optional)</Label><input type="text" value={note} onChange={(e) => setNote(e.target.value)} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} placeholder="Reference" /></div>
      </Card>
      <Card style={{ background: C.ink, color: "#fff", border: "none" }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 8, color: "#B9C4CE" }}><span>THB amount</span><span style={{ fontFamily: "ui-monospace, monospace" }}>฿ {fmt(amountThb, 2)}</span></div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 8, color: "#B9C4CE" }}><span>MMK amount</span><span style={{ fontFamily: "ui-monospace, monospace" }}>{fmt(amountMmk, 0)} K</span></div>
        <div style={{ height: 1, background: "rgba(255,255,255,0.15)", margin: "10px 0" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ color: "#B9C4CE" }}>Estimated profit</span>
          <span style={{ fontSize: 22, fontWeight: 700, color: profit >= 0 ? C.goldSoft : "#F0A79E", fontFamily: "ui-monospace, monospace" }}>{profit >= 0 ? "+" : ""}{fmt(profit, 0)} MMK</span>
        </div>
      </Card>
      <Card>
        <Label>Before you save — verify</Label>
        <label style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 2px", cursor: "pointer" }}>
          <Checkbox checked={checkAmount} onChange={setCheckAmount} />
          <span style={{ fontSize: 14 }}>Check amount — counted and matches what's entered</span>
        </label>
        <label style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 2px", cursor: "pointer" }}>
          <Checkbox checked={checkReceipt} onChange={setCheckReceipt} />
          <span style={{ fontSize: 14 }}>Check receipt — issued / photographed</span>
        </label>
      </Card>
      <button onClick={save} disabled={!canSave} style={{ padding: "14px 0", borderRadius: 12, border: "none", fontWeight: 700, fontSize: 16, background: canSave ? C.gold : "#D8D3C4", color: "#fff", cursor: canSave ? "pointer" : "not-allowed" }}>
        {checkAmount && checkReceipt ? "Save transaction" : "Tick both checks to save"}
      </button>
      </>
      )}
    </div>
  );
}

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: C.gold }}>Tip income</div>
                      <div style={{ fontSize: 12, color: C.textMute, marginTop: 2 }}>
                        {t.currency === "THB" ? `฿ ${fmt(t.amountThb, 2)}` : `${fmt(t.amountMmk, 0)} MMK`} · {new Date(t.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}
                      </div>
                      {t.note && <div style={{ fontSize: 12, color: C.textMute, marginTop: 2, fontStyle: "italic" }}>{t.note}</div>}
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontWeight: 700, fontFamily: "ui-monospace, monospace", color: C.green, fontSize: 14 }}>+{fmt(t.amountMmk, 0)}</div>
                      <button onClick={() => onDeleteTip(t.id)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, marginTop: 4 }}><Icon path={ICONS.trash} size={14} color={C.textMute} /></button>
                    </div>
                  </div>
                </Card>
              ) : (
                <Card key={t.id} style={{ padding: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: t.direction === "buy" ? C.ink : C.inkSoft }}>{t.direction === "buy" ? "Bought THB" : "Sold THB"}</div>
                      <div style={{ fontSize: 12, color: C.textMute, marginTop: 2 }}>฿ {fmt(t.amountThb, 2)} @ {fmt(t.rateApplied, 2)} · {new Date(t.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
                      {t.customerName && <div style={{ fontSize: 12, color: C.ink, marginTop: 2, fontWeight: 600 }}>{t.customerName}</div>}
                      {t.note && <div style={{ fontSize: 12, color: C.textMute, marginTop: 2, fontStyle: "italic" }}>{t.note}</div>}
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontWeight: 700, fontFamily: "ui-monospace, monospace", color: t.profit >= 0 ? C.green : C.red, fontSize: 14 }}>{t.profit >= 0 ? "+" : ""}{fmt(t.profit, 0)}</div>
                      <button onClick={() => onDelete(t.id)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, marginTop: 4 }}><Icon path={ICONS.trash} size={14} color={C.textMute} /></button>
                    </div>
                  </div>
                </Card>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------------- Reports Tab ----------------
function ReportsTab({ transactions, tips, rateHistory, currentRate }) {
  const today = todayKey(Date.now());
  const thisMonth = monthKey(Date.now());
  const allTips = tips || [];
  const profitToday = transactions.filter((t) => todayKey(t.ts) === today).reduce((s, t) => s + t.profit, 0);
  const tipsToday = allTips.filter((t) => todayKey(t.ts) === today).reduce((s, t) => s + t.amountMmk, 0);
  const profitMonth = transactions.filter((t) => monthKey(t.ts) === thisMonth).reduce((s, t) => s + t.profit, 0);
  const tipsMonth = allTips.filter((t) => monthKey(t.ts) === thisMonth).reduce((s, t) => s + t.amountMmk, 0);
  const allProfit = transactions.reduce((s, t) => s + t.profit, 0);
  const allTipsTotal = allTips.reduce((s, t) => s + t.amountMmk, 0);
  const todayProfit = profitToday + tipsToday;
  const monthProfit = profitMonth + tipsMonth;
  const grandTotal = allProfit + allTipsTotal;

  const rateTrend = useMemo(() => {
    const pointMap = {};
    transactions.slice().sort((a, b) => a.ts - b.ts).forEach((t) => { pointMap[todayKey(t.ts)] = t.marketRate; });
    (rateHistory || []).slice().sort((a, b) => a.ts - b.ts).forEach((r) => { pointMap[r.date] = r.rate; });
    const knownDates = Object.keys(pointMap).sort();
    const days = []; let lastKnown = null;
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      if (pointMap[key] !== undefined) lastKnown = pointMap[key];
      else if (lastKnown === null) {
        const before = knownDates.filter((dt) => dt <= key);
        lastKnown = before.length ? pointMap[before[before.length - 1]] : currentRate;
      }
      days.push({ label: key.slice(5), value: Math.round((lastKnown ?? currentRate) * 100) / 100 });
    }
    return days;
  }, [transactions, rateHistory, currentRate]);

  const last14 = useMemo(() => {
    const days = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const profitTotal = transactions.filter((t) => todayKey(t.ts) === key).reduce((s, t) => s + t.profit, 0);
      const tipTotal = allTips.filter((t) => todayKey(t.ts) === key).reduce((s, t) => s + t.amountMmk, 0);
      days.push({ label: key.slice(5), value: Math.round(profitTotal + tipTotal) });
    }
    return days;
  }, [transactions, allTips]);

  const monthly = useMemo(() => {
    const g = {};
    transactions.forEach((t) => { const k = monthKey(t.ts); g[k] = g[k] || { profit: 0, tips: 0, count: 0 }; g[k].profit += t.profit; g[k].count += 1; });
    allTips.forEach((t) => { const k = monthKey(t.ts); g[k] = g[k] || { profit: 0, tips: 0, count: 0 }; g[k].tips += t.amountMmk; });
    return Object.entries(g).sort((a, b) => (a[0] < b[0] ? 1 : -1));
  }, [transactions, allTips]);

  const StatCard = ({ label, value }) => (
    <Card style={{ flex: 1, textAlign: "center" }}>
      <div style={{ fontSize: 11, color: C.textMute, textTransform: "uppercase", letterSpacing: 0.4, marginBottom: 4 }}>{label}</div>
      <div style={{ fontFamily: "ui-monospace, monospace", fontWeight: 700, fontSize: 15, color: value >= 0 ? C.green : C.red }}>{value >= 0 ? "+" : ""}{fmt(value, 0)}</div>
    </Card>
  );

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", gap: 10 }}>
        <StatCard label="Today" value={todayProfit} />
        <StatCard label="This month" value={monthProfit} />
        <StatCard label="All time" value={grandTotal} />
      </div>
      <Card>
        <Label>Income split</Label>
        <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0" }}>
          <span style={{ fontSize: 13, color: C.textMute }}>Exchange profit (all time)</span>
          <span style={{ fontFamily: "ui-monospace, monospace", fontWeight: 700 }}>{fmt(allProfit, 0)} MMK</span>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0" }}>
          <span style={{ fontSize: 13, color: C.textMute }}>Tips (all time)</span>
          <span style={{ fontFamily: "ui-monospace, monospace", fontWeight: 700 }}>{fmt(allTipsTotal, 0)} MMK</span>
        </div>
      </Card>
      <Card>
        <Label>Exchange rate — last 30 days (MMK per 1 THB)</Label>
        <LineChartSVG data={rateTrend} />
        <div style={{ fontSize: 12, color: C.textMute, marginTop: 6 }}>Built from your rate updates and the rate used on each transaction.</div>
      </Card>
      <Card>
        <Label>Daily total income — last 14 days (MMK)</Label>
        <BarChartSVG data={last14} />
        <div style={{ fontSize: 12, color: C.textMute, marginTop: 6 }}>Exchange profit + tips combined.</div>
      </Card>
      <Card>
        <Label>Monthly summary</Label>
        {monthly.length === 0 && <div style={{ fontSize: 13, color: C.textMute }}>No data yet.</div>}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {monthly.map(([m, v]) => {
            const total = v.profit + v.tips;
            return (
              <div key={m} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.line}` }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{m}</div>
                  <div style={{ fontSize: 12, color: C.textMute }}>{v.count} transaction{v.count !== 1 ? "s" : ""}{v.tips ? ` · ${fmt(v.tips, 0)} MMK tips` : ""}</div>
                </div>
                <div style={{ fontFamily: "ui-monospace, monospace", fontWeight: 700, color: total >= 0 ? C.green : C.red }}>{total >= 0 ? "+" : ""}{fmt(total, 0)} MMK</div>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

// ---------------- Customers Tab ----------------
function emptyCustomer() {
  return { id: "", name: "", phone: "", address: "", bankName: "", accountNumber: "", social: "" };
}

function CustomersTab({ customers, banks, onAdd, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(null); // null = list view, {} = new, {...} = editing existing
  const [query, setQuery] = useState("");

  const filtered = customers.filter((c) => c.name.toLowerCase().includes(query.toLowerCase()) || (c.phone || "").includes(query));

  if (editing !== null) {
    return <CustomerForm initial={editing} banks={banks} onCancel={() => setEditing(null)} onSubmit={(c) => {
      if (c.id) { onUpdate(c.id, c); } else { onAdd({ ...c, id: Date.now() + "-" + Math.random().toString(36).slice(2, 7) }); }
      setEditing(null);
    }} />;
  }

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", gap: 8 }}>
        <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search by name or phone" style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} />
        <button onClick={() => setEditing(emptyCustomer())} style={{ padding: "0 16px", borderRadius: 10, border: "none", background: C.gold, color: "#fff", fontWeight: 700, cursor: "pointer" }}>+ New</button>
      </div>
      {filtered.length === 0 && (
        <div style={{ padding: 30, textAlign: "center", color: C.textMute }}>
          <Icon path={ICONS.users} size={26} color={C.textMute} />
          <div style={{ fontWeight: 600, margin: "10px 0 4px" }}>No customers yet</div>
          <div style={{ fontSize: 13 }}>Add a profile to keep bank and contact details on file.</div>
        </div>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtered.map((c) => (
          <Card key={c.id} style={{ padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{c.name}</div>
                {c.phone && <div style={{ fontSize: 13, color: C.textMute, marginTop: 2 }}>{c.phone}</div>}
                {c.bankName && <div style={{ fontSize: 13, color: C.textMute, marginTop: 2 }}>{c.bankName}{c.accountNumber ? ` · ${c.accountNumber}` : ""}</div>}
                {c.address && <div style={{ fontSize: 12, color: C.textMute, marginTop: 2 }}>{c.address}</div>}
                {c.social && <div style={{ fontSize: 12, color: C.ink, marginTop: 2 }}>{c.social}</div>}
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => setEditing(c)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, color: C.gold, fontWeight: 700 }}>Edit</button>
                <button onClick={() => onDelete(c.id)} style={{ background: "none", border: "none", cursor: "pointer", padding: 2 }}><Icon path={ICONS.trash} size={14} color={C.textMute} /></button>
              </div>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function CustomerForm({ initial, banks, onCancel, onSubmit }) {
  const [c, setC] = useState(initial);
  const set = (k) => (e) => setC({ ...c, [k]: e.target.value });
  const canSave = c.name.trim().length > 0;

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      <Card>
        <Label>Name</Label>
        <input type="text" value={c.name} onChange={set("name")} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} placeholder="Customer name" />
        <div style={{ marginTop: 12 }}><Label>Phone number</Label><input type="tel" value={c.phone} onChange={set("phone")} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} placeholder="09xxxxxxxxx" /></div>
        <div style={{ marginTop: 12 }}><Label>Address</Label><input type="text" value={c.address} onChange={set("address")} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} placeholder="Address" /></div>
      </Card>
      <Card>
        <Label>Bank</Label>
        <select value={c.bankName} onChange={set("bankName")} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }}>
          <option value="">Select bank</option>
          {banks.map((b) => <option key={b} value={b}>{b}</option>)}
        </select>
        <div style={{ marginTop: 12 }}><Label>Account number</Label><input type="text" value={c.accountNumber} onChange={set("accountNumber")} style={inputStyle} placeholder="Account number" /></div>
      </Card>
      <Card>
        <Label>Social media / other contact</Label>
        <input type="text" value={c.social} onChange={set("social")} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} placeholder="Facebook / Telegram / Line link" />
      </Card>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={onCancel} style={{ flex: 1, padding: "12px 0", borderRadius: 12, border: `1px solid ${C.line}`, background: "#fff", color: C.textMute, fontWeight: 700, cursor: "pointer" }}>Cancel</button>
        <button onClick={() => canSave && onSubmit(c)} disabled={!canSave} style={{ flex: 2, padding: "12px 0", borderRadius: 12, border: "none", background: canSave ? C.gold : "#D8D3C4", color: "#fff", fontWeight: 700, cursor: canSave ? "pointer" : "not-allowed" }}>Save customer</button>
      </div>
    </div>
  );
}

// ---------------- Settings Tab ----------------
function SettingsTab({ banks, setBanks, googleClientId, setGoogleClientId, accessToken, setAccessToken, syncStatus, setSyncStatus, onRestore }) {
  const [newBank, setNewBank] = useState("");
  const [clientIdInput, setClientIdInput] = useState(googleClientId);

  const addBank = () => {
    const name = newBank.trim();
    if (!name || banks.includes(name)) return;
    setBanks([...banks, name]);
    setNewBank("");
  };
  const removeBank = (name) => setBanks(banks.filter((b) => b !== name));

  const connect = () => {
    if (!window.google || !window.google.accounts) {
      alert("Google sign-in hasn't loaded yet — check your connection and try again.");
      return;
    }
    if (!clientIdInput.trim()) {
      alert("Paste your Google OAuth Client ID first.");
      return;
    }
    setGoogleClientId(clientIdInput.trim());
    const tokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: clientIdInput.trim(),
      scope: "https://www.googleapis.com/auth/drive.file",
      callback: (resp) => {
        if (resp && resp.access_token) {
          setAccessToken(resp.access_token);
          setSyncStatus("synced");
        } else {
          setSyncStatus("error");
        }
      },
    });
    tokenClient.requestAccessToken();
  };

  const disconnect = () => setAccessToken(null);

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      <Card>
        <Label>Google account backup</Label>
        <div style={{ fontSize: 13, color: C.textMute, marginBottom: 12 }}>
          Saves your rates, transactions, customers and banks to a private file in your Google Drive, so you can restore them on a new phone.
        </div>
        {!accessToken ? (
          <>
            <Label>Google OAuth Client ID</Label>
            <input type="text" value={clientIdInput} onChange={(e) => setClientIdInput(e.target.value)} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 13 }} placeholder="xxxxxxxx.apps.googleusercontent.com" />
            <div style={{ fontSize: 12, color: C.textMute, marginTop: 6, marginBottom: 12 }}>
              Create this once in Google Cloud Console (OAuth Client ID, type "Web application", with this site's address added under Authorized JavaScript origins). See the setup notes shared with you.
            </div>
            <button onClick={connect} style={{ width: "100%", padding: "12px 0", borderRadius: 10, border: "none", background: C.ink, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Connect Google Drive</button>
          </>
        ) : (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, color: C.green, fontSize: 14, fontWeight: 600 }}>
              <Icon path={ICONS.check} size={16} color={C.green} /> Connected — {syncStatus === "syncing" ? "syncing…" : "up to date"}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={onRestore} style={{ flex: 1, padding: "12px 0", borderRadius: 10, border: `1px solid ${C.line}`, background: "#fff", color: C.ink, fontWeight: 700, cursor: "pointer" }}>Restore from Drive</button>
              <button onClick={disconnect} style={{ flex: 1, padding: "12px 0", borderRadius: 10, border: `1px solid ${C.line}`, background: "#fff", color: C.red, fontWeight: 700, cursor: "pointer" }}>Disconnect</button>
            </div>
          </>
        )}
      </Card>
      <Card>
        <Label>Banks</Label>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <input type="text" value={newBank} onChange={(e) => setNewBank(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addBank()} style={{ ...inputStyle, fontFamily: "inherit", fontSize: 15 }} placeholder="Add a bank name" />
          <button onClick={addBank} style={{ padding: "0 16px", borderRadius: 10, border: "none", background: C.gold, color: "#fff", fontWeight: 700, cursor: "pointer" }}>Add</button>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {banks.map((b) => (
            <div key={b} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", background: C.paper, borderRadius: 8 }}>
              <span style={{ fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}><Icon path={ICONS.bank} size={14} color={C.textMute} />{b}</span>
              <button onClick={() => removeBank(b)} style={{ background: "none", border: "none", cursor: "pointer", padding: 2 }}><Icon path={ICONS.trash} size={14} color={C.textMute} /></button>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
